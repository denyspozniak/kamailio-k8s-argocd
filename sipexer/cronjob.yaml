apiVersion: batch/v1
kind: CronJob
metadata:
  name: sipexer
  labels:
    app.kubernetes.io/name: sipexer
    app.kubernetes.io/component: load-tester
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      parallelism: 1
      backoffLimit: 0
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sipexer
        spec:
          restartPolicy: Never
          containers:
            - name: sipexer
              image: ghcr.io/denyspozniak/sipexer:latest
              imagePullPolicy: IfNotPresent
              args:
                - "udp:kamailio-svc.kamailio.svc.cluster.local:5060"
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65532
                capabilities:
                  drop: ["ALL"]
