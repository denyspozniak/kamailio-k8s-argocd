#!KAMAILIO
#
# Minimal demo configuration that delegates request routing to Python (KSR).
# Listens on both UDP and TCP, port 5060.
#

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

children=2
auto_aliases=no

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "ipops.so"
loadmodule "kemix.so"

loadmodule "app_python3.so"
modparam("app_python3", "load", "/etc/kamailio/kamailio3.py")

cfgengine "python"
